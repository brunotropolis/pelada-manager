<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pelada Manager — Cadastro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --card:      #161b22;
      --border:    #30363d;
      --accent:    #00e5a0;
      --accent2:   #7c3aed;
      --orange:    #f59e0b;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --error:     #f85149;
      --success:   #3fb950;
      --input-bg:  #0d1117;
      --radius:    10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px;
    }

    .wrap { width: 100%; max-width: 520px; }

    /* ── Header ── */
    header { text-align: center; margin-bottom: 28px; position: relative; }
    .logo { font-size: 2.5rem; line-height: 1; margin-bottom: 10px; filter: drop-shadow(0 0 12px var(--accent)); }
    header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
    header h1 span { color: var(--accent); }
    header p { color: var(--muted); font-size: 0.875rem; margin-top: 4px; }

    .back-link {
      position: absolute;
      top: 4px;
      right: 0;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.8125rem;
      font-weight: 500;
      transition: opacity .15s;
    }
    .back-link:hover { opacity: .75; }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      overflow: hidden;
    }

    /* ── Form fields ── */
    .field { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }
    .req { color: var(--accent); margin-left: 2px; }

    input[type="text"],
    select {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 0.9375rem;
      padding: 10px 14px;
      transition: border-color .15s, box-shadow .15s;
      outline: none;
      font-family: inherit;
    }
    input[type="text"]:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 229, 160, 0.12);
    }
    input::placeholder { color: #3d444d; }
    select { cursor: pointer; }
    select option { background: var(--card); color: var(--text); }

    /* ── Positions grid ── */
    .pos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .pos-option { position: relative; }
    .pos-option input[type="checkbox"] { position: absolute; opacity: 0; width: 0; height: 0; }
    .pos-label {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 12px;
      border: 1px solid var(--border); border-radius: 7px;
      background: var(--input-bg); cursor: pointer;
      font-size: 0.875rem; color: var(--muted);
      transition: border-color .15s, color .15s, background .15s;
      user-select: none;
    }
    .pos-label:hover { border-color: var(--accent); color: var(--text); }
    .pos-option input:checked + .pos-label {
      border-color: var(--accent); color: var(--accent); background: rgba(0, 229, 160, 0.06);
    }
    .pos-option input:disabled + .pos-label {
      opacity: .35; cursor: not-allowed;
    }
    .pos-option input:disabled + .pos-label:hover {
      border-color: var(--border); color: var(--muted);
    }
    .pos-icon { font-size: 1rem; }

    .pos-hint {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 6px;
      text-align: center;
    }
    .pos-hint strong { color: var(--accent); }

    /* ── Buttons ── */
    .btn {
      width: 100%; padding: 12px 24px;
      background: var(--accent); color: #0d1117;
      font-size: 0.9375rem; font-weight: 700;
      border: none; border-radius: 8px; cursor: pointer;
      transition: opacity .15s, transform .1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-family: inherit;
    }
    .btn:hover:not(:disabled) { opacity: .88; }
    .btn:active:not(:disabled) { transform: scale(.98); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,.3); border-top-color: #0d1117;
      border-radius: 50%; animation: spin .7s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn.loading .spinner { display: block; }
    .btn.loading .btn-label { opacity: .7; }

    /* ── Error ── */
    .error-msg {
      background: rgba(248, 81, 73, .1); border: 1px solid rgba(248, 81, 73, .3);
      border-radius: 7px; color: var(--error); font-size: 0.8125rem;
      padding: 10px 14px; margin-bottom: 16px; display: none;
    }
    .error-msg.show { display: block; }

    /* ── Toast notification ── */
    .toast {
      position: fixed; top: 20px; left: 50%;
      transform: translateX(-50%) translateY(-120px);
      z-index: 999; background: var(--card);
      border: 1px solid rgba(63, 185, 80, 0.45);
      border-radius: 12px; padding: 14px 18px;
      display: flex; align-items: center; gap: 13px;
      box-shadow: 0 8px 40px rgba(0,0,0,.7);
      opacity: 0; pointer-events: none;
      max-width: 380px; width: calc(100% - 32px);
      transition: transform 0.38s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; pointer-events: auto; }
    .toast-icon { font-size: 1.6rem; flex-shrink: 0; }
    .toast-body { flex: 1; }
    .toast-title { font-size: 0.875rem; font-weight: 600; color: var(--success); }
    .toast-text { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

    /* ── Footer ── */
    footer {
      text-align: center;
      margin-top: 28px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.75rem;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      body { padding: 16px 12px; }
      .card { padding: 22px 18px; }
      header h1 { font-size: 1.35rem; }
      .logo { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

<div class="wrap">
  <header>
    <a href="presenca.html" class="back-link">&larr; Voltar</a>
    <div class="logo">&#9917;</div>
    <h1>Pelada <span>Manager</span></h1>
    <p>Cadastro de Mensalista</p>
  </header>

  <div class="card">
    <form id="formCadastro" autocomplete="off">

      <!-- Nome -->
      <div class="field">
        <label>Nome do Jogador<span class="req">*</span></label>
        <input type="text" id="nome" placeholder="Ex: Bruno Silva" required />
      </div>

      <!-- Posicoes -->
      <div class="field">
        <label>Posições que joga<span class="req">*</span> <small style="color:var(--muted);font-weight:400">(selecione exatamente 3)</small></label>
        <div class="pos-grid">
          <div class="pos-option">
            <input type="checkbox" id="pos_zagueiro" value="Zagueiro" />
            <label for="pos_zagueiro" class="pos-label"><span class="pos-icon">&#128737;&#65039;</span> Zagueiro</label>
          </div>
          <div class="pos-option">
            <input type="checkbox" id="pos_meia" value="Meia" />
            <label for="pos_meia" class="pos-label"><span class="pos-icon">&#127919;</span> Meia</label>
          </div>
          <div class="pos-option">
            <input type="checkbox" id="pos_ponta" value="Ponta" />
            <label for="pos_ponta" class="pos-label"><span class="pos-icon">&#9889;</span> Ponta</label>
          </div>
          <div class="pos-option">
            <input type="checkbox" id="pos_atacante" value="Atacante" />
            <label for="pos_atacante" class="pos-label"><span class="pos-icon">&#127942;</span> Atacante</label>
          </div>
        </div>
        <div class="pos-hint">Selecionadas: <strong id="posCount">0</strong>/3</div>
      </div>

      <!-- Posicao preferida -->
      <div class="field">
        <label>Posição Preferida<span class="req">*</span></label>
        <select id="posPreferida" required disabled>
          <option value="">Selecione 3 posições acima primeiro</option>
        </select>
      </div>

      <!-- Error -->
      <div class="error-msg" id="errorMsg"></div>

      <!-- Submit -->
      <button type="submit" class="btn" id="btnSubmit">
        <span class="spinner"></span>
        <span class="btn-label">&#9989; Cadastrar Mensalista</span>
      </button>

    </form>
  </div>

  <footer>Pelada Manager &mdash; cadastro de mensalistas</footer>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <div class="toast-icon">&#9989;</div>
  <div class="toast-body">
    <div class="toast-title">Mensalista cadastrado!</div>
    <div class="toast-text" id="toastText">Jogador adicionado com sucesso.</div>
  </div>
</div>

<script>
  const checkboxes = document.querySelectorAll('.pos-grid input[type="checkbox"]');
  const selectPref = document.getElementById('posPreferida');
  const posCount   = document.getElementById('posCount');
  const form       = document.getElementById('formCadastro');
  const errorMsg   = document.getElementById('errorMsg');
  const btnSubmit  = document.getElementById('btnSubmit');
  const toast      = document.getElementById('toast');
  const toastText  = document.getElementById('toastText');

  function getSelected() {
    return [...checkboxes].filter(c => c.checked).map(c => c.value);
  }

  function updatePositions() {
    const selected = getSelected();
    posCount.textContent = selected.length;

    // Disable unchecked boxes when 3 are selected
    checkboxes.forEach(cb => {
      if (!cb.checked) {
        cb.disabled = selected.length >= 3;
      }
    });

    // Populate preferred dropdown
    selectPref.innerHTML = '';
    if (selected.length === 3) {
      selectPref.disabled = false;
      selectPref.innerHTML = '<option value="">Selecione a preferida</option>';
      selected.forEach(pos => {
        const opt = document.createElement('option');
        opt.value = pos;
        opt.textContent = pos;
        selectPref.appendChild(opt);
      });
    } else {
      selectPref.disabled = true;
      selectPref.innerHTML = '<option value="">Selecione 3 posições acima primeiro</option>';
    }

    hideError();
  }

  checkboxes.forEach(cb => cb.addEventListener('change', updatePositions));

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('show');
  }

  function hideError() {
    errorMsg.classList.remove('show');
  }

  function showToast(name) {
    toastText.textContent = `${name} adicionado com sucesso.`;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3500);
  }

  function resetForm() {
    form.reset();
    checkboxes.forEach(cb => { cb.checked = false; cb.disabled = false; });
    updatePositions();
  }

  function setLoading(on) {
    btnSubmit.classList.toggle('loading', on);
    btnSubmit.disabled = on;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideError();

    const nome = document.getElementById('nome').value.trim();
    if (!nome) { showError('Preencha o nome do jogador.'); return; }

    const selected = getSelected();
    if (selected.length !== 3) { showError('Selecione exatamente 3 posições.'); return; }

    const preferida = selectPref.value;
    if (!preferida) { showError('Selecione a posição preferida.'); return; }

    const payload = {
      nome,
      tipo: 'mensalista',
      posicao_1: selected[0],
      posicao_2: selected[1],
      posicao_3: selected[2],
      posicao_preferida: preferida,
      nivel_convidado: ''
    };

    setLoading(true);

    try {
      const res = await fetch('https://n8n-n8n.xktssy.easypanel.host/webhook/pelada-cadastro', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!res.ok) throw new Error(`Erro ${res.status}`);

      showToast(nome);
      resetForm();
    } catch (err) {
      showError(`Falha ao cadastrar: ${err.message}. Tente novamente.`);
    } finally {
      setLoading(false);
    }
  });
</script>

</body>
</html>
